<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Botikit · Recolecciones</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand">
        <h1>Botikit</h1>
        <div class="sub">Recolecciones · <b>Papilomed</b></div>
      </div>

      <div id="msg" class="msg error hidden"></div>

      <form id="loginForm">
        <div style="margin-bottom:14px;">
          <label for="email">Correo</label>
          <input type="email" id="email" autocomplete="username" required />
        </div>
        <div style="margin-bottom:20px;">
          <label for="password">Contraseña</label>
          <input type="password" id="password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-block" id="submitBtn">Entrar</button>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    // Si ya hay sesión, ir directo al dashboard.
    api.get('/api/auth/me').then(() => { location.href = '/dashboard.html'; }).catch(() => {});

    const form = document.getElementById('loginForm');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.classList.add('hidden');
      btn.disabled = true;
      try {
        await api.post('/api/auth/login', {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        });
        location.href = '/dashboard.html';
      } catch (err) {
        msg.textContent = err.message || 'No se pudo iniciar sesión';
        msg.classList.remove('hidden');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
